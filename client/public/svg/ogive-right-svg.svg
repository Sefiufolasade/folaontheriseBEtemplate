<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="300" height="150">
  <!-- Transparent background -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- Outer ogive curve -->
  <path
    d="M10,140 
       Q 80,100  150,40 
       Q 220,100 290,20"
    fill="none"
    stroke="#856a17"
    stroke-width="3"
    stroke-linecap="round"
  />

  <!-- Middle ogive curve -->
  <path
    d="M10,140 
       Q 80,110  150,60 
       Q 220,110 290,40"
    fill="none"
    stroke="#B78C3F"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Inner ogive curve -->
  <path
    d="M10,140 
       Q 80,120  150,80 
       Q 220,120 290,60"
    fill="none"
    stroke="#D9B38F"
    stroke-width="1.5"
    stroke-linecap="round"
  />
</svg>
